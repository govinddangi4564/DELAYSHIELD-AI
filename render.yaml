services:
  - type: web
    name: delayshield-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: "https://your-vercel-app-url.vercel.app" # REPLACE THIS AFTER VERCEL DEPLOYMENT
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: delayshield_ai
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: ROUTE_API_KEY
        sync: false
