name: Keep Render Backend Alive

on:
  schedule:
    - cron: "*/14 * * * *" # Runs every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" https://delayshield-ai.onrender.com > /dev/null
